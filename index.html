// ---------- global styles + keyframes ----------
function GlobalCss() {
  return (
    <style>{`
      *{margin:0;padding:0;box-sizing:border-box}
      html{scroll-behavior:smooth}
      body{background:${C.bg};color:${C.white};font-family:${F.body};font-size:16px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}

      button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}

      @keyframes bkPulse {
        0%,100%{opacity:.55;transform:scale(1)}
        50%{opacity:.85;transform:scale(1.04)}
      }
      @keyframes bkBlink {
        0%,100%{opacity:1}
        50%{opacity:.2}
      }
      @keyframes bkTick {
        0%{transform:translateY(4px);opacity:0}
        100%{transform:translateY(0);opacity:1}
      }
      @keyframes bkFade {
        0%{opacity:0;transform:translateY(12px)}

      }
      @keyframes bkTrace {
        0%   { stroke-dashoffset: 200; opacity:0 }
        10%  { opacity:1 }
        90%  { opacity:1 }
        100% { stroke-dashoffset: 0;   opacity:0 }

      @keyframes bkPacket {
        0%   { offset-distance: 0%;   opacity:0 }
        8%   { opacity:1 }
        92%  { opacity:1 }

      }
      @keyframes bkScan {

        100% { transform: translateY(100%) }

      .bk-reveal { opacity:0; animation: bkFade .7s ease forwards }
      .bk-reveal-1 { animation-delay: .05s }
      .bk-reveal-2 { animation-delay: .15s }
      .bk-reveal-3 { animation-delay: .25s }
      .bk-reveal-4 { animation-delay: .35s }
      .bk-reveal-5 { animation-delay: .45s }

      .bk-hoverlink { transition: color .2s ease }
      .bk-hoverlink:hover { color: ${C.cyan} !important }

      .bk-btn {
        display:inline-flex;align-items:center;gap:.55rem;

        cursor:pointer;transition:all .18s ease;
      }
      .bk-btn:hover { background:${C.cyan}; color:${C.bg} }
      .bk-btn-sm { padding:.55rem 1.1rem;font-size:.72rem }

      .bk-field {
        padding:.85rem 1rem;background:${C.bg2};
        border:1px solid ${C.border};color:${C.white};
        font-family:${F.body};font-size:.95rem;outline:none;

      /* coordinate backdrop */

// ---------- shared section shell ----------
function Section({ id, children, label, labelColor = C.cyan, title, sub, coord = 'fine', pad = '7rem 4rem 5rem', onEnter }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVis(true); onEnter && onEnter(id); }
    }, { threshold: 0.2 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [id]);
  return (
    <section ref={ref} id={id} style={{position:'relative',padding:pad,maxWidth:1280,margin:'0 auto',borderTop:`1px solid ${C.border}`}}>
      {coord === 'fine'  && <div className="bk-coord-fine" />}
      {coord === 'grid'  && <div className="bk-coord" />}
      <div style={{position:'relative',zIndex:1,opacity:vis?1:0,transform:vis?'none':'translateY(12px)',transition:'opacity .7s ease, transform .7s ease'}}>
        {(label || title) && (
          <header style={{marginBottom:'2.4rem',display:'flex',flexDirection:'column',gap:'.65rem',maxWidth:880}}>
            {label && <Label color={labelColor}>{label}</Label>}
            {title && <h2 style={{fontFamily:F.display,fontWeight:800,fontSize:'clamp(2rem,4vw,3.2rem)',lineHeight:1.05,letterSpacing:'.01em',color:C.white,textWrap:'balance'}}>{title}</h2>}
            {sub && <p style={{color:C.slate,fontStyle:'italic',fontSize:'1rem',maxWidth:820,textWrap:'pretty'}}>{sub}</p>}
          </header>
        )}
        {children}
      </div>
    </section>
  );
}

// ---------- label / eyebrow ----------
function Label({ color = C.cyan, children, num }) {
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:'.7rem',color}}>
      {num !== undefined && (
        <span style={{fontFamily:F.mono,fontSize:'.65rem',letterSpacing:'.12em',color:C.dim}}>
          {String(num).padStart(2,'0')}

      <span style={{fontFamily:F.display,fontSize:'.72rem',fontWeight:700,letterSpacing:'.25em',textTransform:'uppercase'}}>{children}</span>
    </div>
  );
}

// ---------- mono tag ----------
function Tag({ color = C.slate, children, solid = false }) {
  return (
    <span style={{
      fontFamily:F.mono,fontSize:'.58rem',fontWeight:500,
      letterSpacing:'.14em',textTransform:'uppercase',
      padding:'.25rem .55rem',
      border:`1px solid ${color}`,
      color: solid ? C.bg : color,
      background: solid ? color : 'transparent',
      whiteSpace:'nowrap',

}

// ---------- coordinate readout (decorative "instrument" chrome) ----------
function Readout({ label, value, color = C.slate }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      <span style={{fontFamily:F.mono,fontSize:'.55rem',letterSpacing:'.15em',color:C.dim,textTransform:'uppercase'}}>{label}</span>
      <span style={{fontFamily:F.mono,fontSize:'.7rem',letterSpacing:'.08em',color}}>{value}</span>
    </div>
  );
}

// ---------- orb ----------
function Orb({ size = '100%', intensity = 1 }) {
  const ring = {position:'absolute',borderRadius:'50%',border:`1px solid rgba(0,194,255,${0.15*intensity})`,background:`rgba(0,194,255,${0.06*intensity})`};
  return (
    <div style={{position:'relative',width:size,height:size}}>
      <div style={{...ring, inset:0}} />
      <div style={{...ring, inset:'12%', background:`rgba(0,194,255,${0.10*intensity})`, borderColor:`rgba(0,194,255,${0.22*intensity})`}} />
      <div style={{...ring, inset:'26%', background:`rgba(0,194,255,${0.18*intensity})`, borderColor:`rgba(0,194,255,${0.35*intensity})`}} />
      <div style={{...ring, inset:'40%', background:`rgba(0,194,255,${0.52*intensity})`, border:'none', animation:'bkPulse 3s ease-in-out infinite'}} />
    </div>
  );
}

// ---------- framed card (signature hairline + corner ticks) ----------
function FrameCard({ accent = C.cyan, edge = 'top', children, style, pad = '1.5rem 1.4rem' }) {
  return (
    <div style={{
      background:C.bg3,position:'relative',padding:pad,
      borderTop: edge === 'top'  ? `3px solid ${accent}` : undefined,
      borderLeft:edge === 'left' ? `3px solid ${accent}` : undefined,
      ...style,
    }}>
      <Corners />
      {children}
    </div>
  );
}

function Corners({ color = C.border }) {
  const s = {position:'absolute',width:8,height:8,borderColor:color,borderStyle:'solid'};
  return (
    <>
      <span style={{...s,top:0,left:0,borderWidth:'1px 0 0 1px'}}/>
      <span style={{...s,top:0,right:0,borderWidth:'1px 1px 0 0'}}/>
      <span style={{...s,bottom:0,left:0,borderWidth:'0 0 1px 1px'}}/>
      <span style={{...s,bottom:0,right:0,borderWidth:'0 1px 1px 0'}}/>
    </>
  );
}

Object.assign(window, {
  C, rgb, F, GlobalCss, Section, Label, Tag, Readout, Orb, FrameCard, Corners,
});

// Random anchor + jitter — ring around the orb, biased away from corner readouts
function randomOrbSlot() {
  const anchors = [
    { t: 10, l: 50 }, { t: 20, l: 80 }, { t: 48, l: 92 }, { t: 78, l: 80 },
    { t: 90, l: 50 }, { t: 78, l: 20 }, { t: 48, l: 8 }, { t: 20, l: 20 },
    { t: 34, l: 64 }, { t: 64, l: 36 }, { t: 30, l: 36 }, { t: 66, l: 64 },
    { t: 14, l: 34 }, { t: 14, l: 66 }, { t: 86, l: 34 }, { t: 86, l: 66 },
    { t: 52, l: 72 }, { t: 52, l: 28 },
  ];
  const a = anchors[Math.floor(Math.random() * anchors.length)];
  return {
    top: `${Math.max(7, Math.min(93, a.t + (Math.random() - 0.5) * 12))}%`,
    left: `${Math.max(10, Math.min(90, a.l + (Math.random() - 0.5) * 12))}%`,
  };
}

// orb + readouts; optional use-case thumbnails that pop at random positions around the orb
function HeroInstrument({ showUseCases = false }) {
  const [useCasePops, setUseCasePops] = useState([]);
  useEffect(() => {
    if (!showUseCases) {
      setUseCasePops([]);
      return undefined;
    }
    const timeouts = [];
    let cancelled = false;
    const spawn = () => {
      if (cancelled) return;
      const slideIdx = Math.floor(Math.random() * HERO_USE_CASE_SLIDES.length);
      const pos = randomOrbSlot();
      const id = `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
      setUseCasePops(p => [...p, { id, slideIdx, ...pos }].slice(-5));
      const tid = window.setTimeout(() => {
        if (!cancelled) setUseCasePops(p => p.filter(x => x.id !== id));
      }, 3000);
      timeouts.push(tid);
    };
    spawn();
    const interval = window.setInterval(spawn, 2100 + Math.random() * 1400);
    return () => {
      cancelled = true;
      window.clearInterval(interval);
      timeouts.forEach(tid => window.clearTimeout(tid));
    };
  }, [showUseCases]);

  return (
    <div style={{position:'absolute',inset:0}}>
      {/* bracket corners */}
      <CornerTicks />

      {/* orb */}
      <div style={{position:'absolute',inset:'12%',zIndex:2}}>
        <Orb size="100%" />
      </div>

      {/* use-case pops — random positions on the HUD (above rings, below readouts) */}
      {showUseCases && (
        <div style={{position:'absolute',inset:0,zIndex:4,pointerEvents:'none'}}>
          {useCasePops.map(({ id, slideIdx, top, left }) => {
            const s = HERO_USE_CASE_SLIDES[slideIdx];
            return (
              <div
                key={id}
                style={{
                  position:'absolute',
                  top,
                  left,
                  transform:'translate(-50%, -50%)',
                  width:108,
                  borderRadius:4,
                  overflow:'hidden',
                  boxShadow:`0 4px 20px rgba(0,0,0,0.55), 0 0 0 1px ${s.color}66`,
                  animation:'bkPopIn 0.42s ease-out forwards',
                }}
              >
                <div style={{height:52,overflow:'hidden'}}>
                  <img
                    src={s.img}
                    alt={s.title}
                    width={216}
                    height={104}
                    style={{width:'100%',height:'100%',objectFit:'cover'}}
                    loading="lazy"
                    decoding="async"
                  />
                </div>
                <div style={{
                  padding:'4px 6px 5px',
                  background:`linear-gradient(180deg, ${C.bg3} 0%, ${C.bgDeep} 100%)`,
                  borderTop:`2px solid ${s.color}`,
                }}>
                  <div style={{fontFamily:F.mono,fontSize:'.45rem',letterSpacing:'.12em',color:C.dim,textTransform:'uppercase',lineHeight:1.2}}>{s.code}</div>
                  <div style={{fontFamily:F.display,fontWeight:700,fontSize:'.62rem',color:C.white,marginTop:1,lineHeight:1.15}}>{s.title}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* readouts overlay */}
      <div style={{position:'absolute',top:'2%',left:'4%',display:'flex',flexDirection:'column',gap:10,zIndex:10}}>
        <Readout label="NODE" value="KIBU-ECC-01" color={C.cyan}/>
        <Readout label="MODE" value="AUTONOMOUS" color={C.green}/>
        <Readout label="MEM"  value="0.94 / 1.00" color={C.slate}/>
      </div>
      <div style={{position:'absolute',bottom:'2%',right:'4%',display:'flex',flexDirection:'column',gap:10,alignItems:'flex-end',zIndex:10}}>
        <Readout label="TURN"    value="#001,247" color={C.cyan}/>
        <Readout label="LATENCY" value="38 ms"    color={C.green}/>
        <Readout label="POWER"   value="2.1 W"    color={C.amber}/>
      </div>

      {/* inner cross-hairs */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
        <line x1="50%" y1="8%"  x2="50%" y2="18%" stroke={C.border}/>
        <line x1="50%" y1="82%" x2="50%" y2="92%" stroke={C.border}/>
        <line x1="8%"  y1="50%" x2="18%" y2="50%" stroke={C.border}/>
        <line x1="82%" y1="50%" x2="92%" y2="50%" stroke={C.border}/>
      </svg>
    </div>
  );
}

function CornerTicks({ color = C.cyan }) {
  const len = 18;
  const base = {position:'absolute',width:len,height:len,borderColor:color,borderStyle:'solid'};
  return (
    <>
      <span style={{...base,top:0,left:0,borderWidth:'1px 0 0 1px'}}/>
      <span style={{...base,top:0,right:0,borderWidth:'1px 1px 0 0'}}/>
      <span style={{...base,bottom:0,left:0,borderWidth:'0 0 1px 1px'}}/>
      <span style={{...base,bottom:0,right:0,borderWidth:'0 1px 1px 0'}}/>
    </>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "ambient_grid": "fine",
  "hero_metrics": true,
  "turn_autoplay": true,
  "accent_primary": "cyan",
  "section_order": "architecture_first"
}/*EDITMODE-END*/;

function App() {
  const [active, setActive] = useState('hero');
  const [sent, setSent] = useState(false);
  const [progress, setProgress] = useState(0);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaksAvailable, setTweaksAvailable] = useState(false);

  // scroll progress
  useEffect(() => {
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(max > 0 ? Math.min(1, window.scrollY / max) : 0);
      // active section
      const sections = ['hero','stack','turn','problem','solutions','memory','security','sectors','deployment','close'];
      for (const id of sections) {
        const el = document.getElementById(id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top <= 140 && r.bottom > 140) { setActive(id); break; }
      }
    };
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    setTweaksAvailable(true);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(t => ({...t, [k]: v}));
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*'); } catch {}
  };

  const sendHelloEmail = (addr) => {
    const from = String(addr || '').trim();
    if (!from) return;
    const subject = encodeURIComponent(`Hello — ${from}`);
    const body = encodeURIComponent(
      'Hello Bright KIBU,\n\n' +
      '(Your message here.)\n\n' +
      '—\n' +
      `From: ${from}\n`
    );
    window.location.href = `mailto:hello@brightkibu.com?subject=${subject}&body=${body}`;
    setSent(true);
  };

  const nav = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({top: el.offsetTop - 60, behavior:'smooth'});
  };

  // section order variants
  const architecture_first = (
    <>
      <StackSectionShell tweaks={tweaks}/>
      <TurnSectionShell tweaks={tweaks}/>
      <ProblemSection/>
      <SolutionsSection/>
      <MemorySection/>
      <SecuritySection/>
      <SectorsSection/>
      <DeploymentSection/>
    </>
  );
  const problem_first = (
    <>
      <ProblemSection/>
      <SolutionsSection/>
      <StackSectionShell tweaks={tweaks}/>
      <TurnSectionShell tweaks={tweaks}/>
      <MemorySection/>
      <SecuritySection/>
      <SectorsSection/>
      <DeploymentSection/>
    </>
  );

  return (
    <>
      <GlobalCss/>
      <Nav active={active} onNav={nav} progress={progress}/>
      <Hero onCta={()=>nav('close')}/>
      {tweaks.section_order === 'problem_first' ? problem_first : architecture_first}
      <Close sent={sent} onSend={sendHelloEmail}/>
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>setTweaksOpen(false)}/>}
    </>
  );
}

            background:value===o?C.cyan:'transparent',color:value===o?C.bg:C.slate,
            borderRight:`1px solid ${C.border}`,
          }}>{o.replace(/_/g,' ')}</button>
        ))}
      </div>
    </div>
  );
}

// Wait for all babel-transpiled scripts to register their globals before rendering.
window.App = App;
function tryRender() {
  if (window.Nav && window.Hero && window.StackTopology && window.ProblemSection && window.SecuritySection && window.SectorsSection && window.Close) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(tryRender, 30);
  }
}
tryRender();
</script>
</body>
